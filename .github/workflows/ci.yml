name: MLflow Project Training CI

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "MLProject/**"
      - ".github/workflows/ci.yml"

jobs:
  train-build-and-push:
    runs-on: ubuntu-latest

    env:
      DOCKER_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/natural-scene-classifier:latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          miniconda-version: "latest"
          activate-environment: natural-scene-classification
          environment-file: MLProject/conda.yaml
          auto-activate-base: false

      - name: Install MLflow runner
        shell: bash -l {0}
        run: |
          pip install mlflow==2.19.0

      - name: Run MLflow Project training
        shell: bash -l {0}
        working-directory: MLProject
        run: |
          mlflow run . -e main \
            --experiment-name "Natural Scene Classification CI" \
            -P dataset_dir=dataset_preprocessing \
            -P epochs=2 \
            -P batch_size=16 \
            -P image_size=160

      - name: Verify MLflow run output
        shell: bash -l {0}
        working-directory: MLProject
        run: |
          test -f run_id.txt
          test -d mlruns
          test -f model.keras
          test -d training_artifacts
          echo "MLFLOW_RUN_ID=$(cat run_id.txt)" >> "$GITHUB_ENV"

      - name: Upload MLflow runs and model artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mlflow-training-output
          path: |
            MLProject/mlruns
            MLProject/training_artifacts
            MLProject/model.keras
            MLProject/run_id.txt
          if-no-files-found: error

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker image from MLflow model
        shell: bash -l {0}
        working-directory: MLProject
        run: |
          mlflow models build-docker \
            -m "runs:/${MLFLOW_RUN_ID}/model" \
            -n "${DOCKER_IMAGE}"

      - name: Push Docker image to Docker Hub
        run: |
          docker push "${DOCKER_IMAGE}"
